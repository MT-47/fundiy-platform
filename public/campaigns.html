<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fundiy - Campaign</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/campaigns.css" />
</head>
<body>

  <header>
    <div class="logo">Fundiy</div>
    <nav id="main-nav"></nav>
  </header>

  <main>
    <div id="campaign-details"></div>

    <section id="pledge-section">
      <h3>Support this Campaign</h3>
      <div id="pledge-msg"></div>
      <div class="form-group">
        <label>Amount ($)</label>
        <input type="number" id="pledge-amount" placeholder="Enter amount" min="1" />
      </div>
      <button class="btn btn-green" id="pledge-btn">Pledge Now</button>
    </section>

    <section id="pledges-list">
      <h3>Recent Pledges</h3>
      <div id="pledges-container"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 Fundiy. All rights reserved to Mustafa Taher - .Net ITI Zagazig.</p>
  </footer>

  <script src="js/campaigns.js"></script>
</body>
</html>
